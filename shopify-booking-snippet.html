<!-- BIW Booking Modal Snippet -->
<!-- Paste this right before the closing </body> tag in theme.liquid -->

<style>
  /* The Cal.com style overlay */
  #biw-booking-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  
  #biw-booking-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  /* The Modal Container */
  #biw-booking-modal {
    position: relative;
    width: 100%;
    max-width: 1000px;
    height: 90vh;
    max-height: 800px;
    background: transparent;
    border-radius: 24px;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  #biw-booking-overlay.is-open #biw-booking-modal {
    transform: scale(1) translateY(0);
  }

  /* The Iframe */
  #biw-booking-iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 24px;
    background: transparent;
  }

  /* Close Button */
  #biw-booking-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,0,0.05);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
  }
  #biw-booking-close:hover {
    background: rgba(0,0,0,0.1);
  }
  
  @media (max-width: 768px) {
    #biw-booking-modal {
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
    }
    #biw-booking-iframe {
      border-radius: 0;
    }
    #biw-booking-close {
      top: 16px;
      right: 16px;
    }
  }
</style>

<!-- Native Shopify Button -->
<button class="button button--primary button--full-width biw-trigger-btn" style="width: 100%; margin-bottom: 1rem; border-radius: 0; min-height: 4.6rem; letter-spacing: 0.1rem; text-transform: uppercase;">
  Book Appointment
</button>

<div id="biw-booking-overlay">
  <div id="biw-booking-modal">
    <button id="biw-booking-close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 1L1 13M1 1L13 13" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <iframe id="biw-booking-iframe" src="about:blank"></iframe>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var overlay = document.getElementById('biw-booking-overlay');
    
    // Move the overlay to the body to escape any Shopify theme CSS transform/contain contexts!
    document.body.appendChild(overlay);

    var closeBtn = document.getElementById('biw-booking-close');
    var iframe = document.getElementById('biw-booking-iframe');

    // Base URL of your Next.js app
    var baseUrl = "https://crm.biw.salon/book";

    // Function to open modal
    function openBookingModal(serviceName) {
      var url = baseUrl;
      if (serviceName) {
        url += "?service=" + encodeURIComponent(serviceName);
      }
      iframe.src = url;
      overlay.classList.add('is-open');
      document.body.style.overflow = 'hidden'; // prevent background scrolling
    }

    // Function to close modal
    function closeBookingModal() {
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      setTimeout(function() {
        iframe.src = ""; // Clear iframe to reset state
      }, 300);
    }

    closeBtn.addEventListener('click', closeBookingModal);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        closeBookingModal();
      }
    });

    // Automatically bind to ANY button or link that has href="#book", data-action="book", or our native class
    var bookButtons = document.querySelectorAll('a[href="#book"], button[data-action="book"], .biw-trigger-btn');
    
    bookButtons.forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        
        // If on a product page in Shopify, we can grab the title dynamically
        // or you can set a data-service attribute on the button!
        var service = btn.getAttribute('data-service') || '{{ product.title | escape }}';
        
        openBookingModal(service);
      });
    });
  });
</script>
