<!-- 
  Shopify Booking Popup Snippet 
  Instructions:
  1. In your Shopify Admin, go to Products and add the tag "Service" to all your service products.
  2. Go to Shopify Theme Editor -> Default Product Template
  3. Add a "Custom Liquid" block at the bottom of your Product Information section.
  4. Paste this entire code block into the Custom Liquid block.
  Note: This code automatically hides the normal "Add to Cart" button and shows the "Book Appointment" button ONLY if the product has the "Service" tag!
-->
{% if product.tags contains 'Service' or product.tags contains 'service' %}
<style>
  /* Automatically hide the standard Add to Cart and Quantity selectors for Services */
  .product-form__buttons, .product-form__submit, button[name="add"] { display: none !important; }
  .quantity__input, .quantity__button, .product-form__quantity { display: none !important; }
  shopify-payment-terms { display: none !important; }

  /* Perfectly matches your "Buy it now" button */
  .custom-book-btn { 
    background: #2b2e2e; 
    color: #ffffff; 
    padding: 14px 24px; 
    border: none; 
    border-radius: 4px; 
    cursor: pointer; 
    font-size: 16px; 
    width: 100%; 
    margin-top: 10px; 
    font-family: inherit;
    transition: background 0.2s ease;
  }
  .custom-book-btn:hover { background: #1a1c1c; }
  
  /* iOS & Android optimized overlay */
  .booking-modal-overlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 999999; justify-content: center; align-items: flex-end; /* Slides from bottom on mobile */
  }
  
  .booking-modal-content { 
    background: #ffffff; width: 100%; height: 90vh; max-width: 500px; 
    border-radius: 20px 20px 0 0; position: relative; display: flex; flex-direction: column; 
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @media (min-width: 768px) {
    .booking-modal-overlay { align-items: center; }
    .booking-modal-content { height: 85vh; border-radius: 12px; animation: fadeIn 0.2s ease; }
  }

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

  .booking-modal-close { 
    position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; 
    background: #f0f0f0; border: none; z-index: 10; color: #333; 
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  
  /* Required for smooth scrolling on iOS */
  .iframe-wrapper {
    flex: 1; width: 100%; -webkit-overflow-scrolling: touch; overflow-y: scroll; border-radius: inherit;
  }
</style>

<!-- The Button -->
<button class="custom-book-btn" onclick="document.getElementById('bookingModal').style.display='flex'">Book Appointment</button>

<!-- The Hidden Popup Modal -->
<div id="bookingModal" class="booking-modal-overlay">
  <div class="booking-modal-content">
    <button class="booking-modal-close" onclick="document.getElementById('bookingModal').style.display='none'">&times;</button>
    <div class="iframe-wrapper">
      <!-- Make sure this URL matches your final deployed booking URL! -->
      <iframe src="https://biw.salon/book?service={{ product.title | url_encode }}" width="100%" height="100%" style="border: none; margin-top: 55px; min-height: 800px;"></iframe>
    </div>
  </div>
</div>

{% endif %}
